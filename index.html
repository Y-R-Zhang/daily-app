<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>旅途记录</title>
    <style>
        :root {
            --bg: #fff;
            --bg2: #f7f7f5;
            --bg3: #eeecea;
            --border: rgba(0, 0, 0, 0.09);
            --border2: rgba(0, 0, 0, 0.16);
            --text: #1a1a18;
            --text2: #5c5c58;
            --text3: #9c9c96;
            --r: 10px;
            --rsm: 6px;
            --sw: 172px;
            --th: 48px;
            --green: #1D9E75;
            --green-bg: #EAF3DE;
            --green-t: #2a6b1a;
            --amber: #BA7517;
            --amber-bg: #FAEEDA;
            --amber-t: #7a4a08;
            --blue: #378ADD;
            --blue-bg: #E6F1FB;
            --blue-t: #185FA5;
            --gray: #888780;
            --gray-bg: #F1EFE8;
            --gray-t: #4a4a46;
            --pink: #D4537E;
            --pink-bg: #FBEAF0;
            --pink-t: #7a2040;
            --red: #E24B4A;
            --red-bg: #FCEBEB;
            --red-t: #8a1f1e;
            --gold: #C78A1C;
            --gold-bg: #FDF3DC;
            --gold-t: #6b4208;
            --purple: #7B4FBF;
            --purple-bg: #F2EAFC;
            --purple-t: #3d1f6e;
        }
        @media(prefers-color-scheme:dark) {
            :root {
                --bg: #1c1c1a;
                --bg2: #242422;
                --bg3: #2c2c2a;
                --border: rgba(255, 255, 255, 0.09);
                --border2: rgba(255, 255, 255, 0.18);
                --text: #f0f0ec;
                --text2: #aaa9a3;
                --text3: #686864;
                --green-bg: #0e3020;
                --green-t: #6ecfa4;
                --amber-bg: #3a2408;
                --amber-t: #f0b84a;
                --blue-bg: #0b2840;
                --blue-t: #7dbcf0;
                --gray-bg: #282826;
                --gray-t: #aaa9a3;
                --pink-bg: #38101e;
                --pink-t: #f0829a;
                --red-bg: #381010;
                --red-t: #f08080;
                --gold-bg: #3a2808;
                --gold-t: #e0b84a;
                --purple-bg: #201030;
                --purple-t: #b890e8;
            }
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg2); color: var(--text); font-size: 14px; line-height: 1.5; }
        button { font-family: inherit; cursor: pointer; }
        .app { display: flex; flex-direction: column; height: 100dvh; max-width: 900px; margin: 0 auto; background: var(--bg); box-shadow: 0 0 0 0.5px var(--border); }
        .topbar { height: var(--th); min-height: var(--th); display: flex; align-items: center; padding: 0 14px; gap: 8px; border-bottom: 0.5px solid var(--border); background: var(--bg); z-index: 10; flex-shrink: 0; overflow-x: auto; }
        .logo { display: flex; align-items: center; gap: 7px; font-size: 14px; font-weight: 600; color: var(--text); white-space: nowrap; flex-shrink: 0; }
        .tab-strip { display: flex; gap: 2px; margin-left: auto; background: var(--bg2); border-radius: 8px; padding: 3px; overflow-x: auto; scrollbar-width: none; flex-shrink: 0; }
        .tab-strip::-webkit-scrollbar { display: none; }
        .tbtn { font-size: 12px; padding: 4px 9px; border-radius: 6px; border: none; color: var(--text2); background: none; transition: all .15s; white-space: nowrap; }
        .tbtn.active { background: var(--bg); color: var(--text); font-weight: 500; box-shadow: 0 1px 3px rgba(0, 0, 0, .07); }
        .body { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: var(--sw); min-width: var(--sw); border-right: 0.5px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; padding: 6px; flex-shrink: 0; }
        .ss { font-size: 10px; font-weight: 600; color: var(--text3); padding: 10px 6px 3px; letter-spacing: .07em; text-transform: uppercase; }
        .si { display: flex; align-items: center; gap: 7px; padding: 6px 7px; border-radius: var(--rsm); cursor: pointer; font-size: 12.5px; color: var(--text2); transition: all .12s; }
        .si:hover, .si.on { background: var(--bg2); color: var(--text); }
        .si.on { font-weight: 500; }
        .sbar { width: 3px; height: 14px; border-radius: 2px; flex-shrink: 0; }
        .content { flex: 1; overflow-y: auto; position: relative; }
        .view { display: none; padding: 14px 14px 70px; }
        .view.active { display: block; }
        .pc { border: 0.5px solid var(--border); border-radius: var(--r); margin-bottom: 9px; display: flex; overflow: hidden; }
        .stbar { width: 4px; flex-shrink: 0; }
        .pbody { flex: 1; min-width: 0; }
        .phdr { display: flex; align-items: center; gap: 7px; padding: 10px 12px; cursor: pointer; transition: background .12s; user-select: none; }
        .phdr:hover { background: var(--bg2); }
        .chev { font-size: 9px; color: var(--text3); transition: transform .2s; flex-shrink: 0; pointer-events: none; }
        .chev.open { transform: rotate(90deg); }
        .pname { font-size: 13px; font-weight: 500; flex: 1; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; pointer-events: none; }
        .pmeta { font-size: 11px; color: var(--text3); white-space: nowrap; pointer-events: none; }
        .spill { font-size: 10px; padding: 2px 8px; border-radius: 20px; border: none; font-family: inherit; font-weight: 500; cursor: pointer; transition: opacity .15s; white-space: nowrap; position: relative; z-index: 2; }
        .spill:hover { opacity: .75; }
        .ptasks { display: none; border-top: 0.5px solid var(--border); }
        .ptasks.open { display: block; }
        .tr { display: flex; align-items: center; gap: 8px; padding: 7px 12px; cursor: pointer; transition: all .2s; border-bottom: 0.5px solid var(--border); }
        .tr:last-child { border-bottom: none; }
        .tr:hover { background: var(--bg2); }
        .tr.done-row { opacity: 0.7; transform: scale(0.98); }
        .chk { width: 15px; height: 15px; border-radius: 50%; border: 1.5px solid var(--border2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all .15s; pointer-events: auto; }
        .chk.done { background: var(--blue); border-color: var(--blue); }
        .chk.done::after { content: ''; width: 5px; height: 3px; border-left: 1.5px solid #fff; border-bottom: 1.5px solid #fff; transform: rotate(-45deg) translateY(-1px); display: block; }
        .tname { font-size: 12.5px; color: var(--text); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; pointer-events: none; }
        .tname.done { text-decoration: line-through; color: var(--text3); }
        .urg { font-size: 10px; padding: 1px 6px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; font-weight: 500; pointer-events: none; }
        .u-high { background: var(--red-bg); color: var(--red-t); }
        .u-mid { background: var(--amber-bg); color: var(--amber-t); }
        .u-low { background: var(--green-bg); color: var(--green-t); }
        .sc { border: 0.5px solid var(--border); border-radius: var(--r); margin-bottom: 7px; display: flex; overflow: hidden; }
        .scb { flex: 1; display: flex; align-items: center; gap: 8px; padding: 8px 12px; cursor: pointer; transition: background .12s; }
        .scb:hover { background: var(--bg2); }
        .sl { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .07em; margin: 16px 0 8px; }
        .today-hdr { display: flex; align-items: baseline; gap: 8px; margin-bottom: 14px; }
        .tday-d { font-size: 22px; font-weight: 600; }
        .tday-s { font-size: 12px; color: var(--text3); }
        .streak { font-size: 11px; color: var(--text3); margin-left: auto; white-space: nowrap; pointer-events: none; }
        .cal-nav { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
        .cal-m { font-size: 15px; font-weight: 600; flex: 1; }
        .cnbtn { width: 28px; height: 28px; border-radius: var(--rsm); border: 0.5px solid var(--border); background: none; color: var(--text2); font-size: 16px; display: flex; align-items: center; justify-content: center; transition: background .12s; }
        .cnbtn:hover { background: var(--bg2); }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin-bottom: 14px; }
        .cdow { font-size: 10px; font-weight: 600; color: var(--text3); text-align: center; padding: 3px 0; letter-spacing: .04em; }
        .cday { border-radius: var(--rsm); padding: 4px 2px 5px; min-height: 46px; cursor: pointer; border: 0.5px solid transparent; transition: all .12s; display: flex; flex-direction: column; align-items: center; gap: 3px; }
        .cday:hover { background: var(--bg2); }
        .cday.other .cnum { opacity: .3; }
        .cday.today .cnum { background: var(--blue); color: #fff; }
        .cday.selected { border-color: var(--blue); background: var(--blue-bg); }
        .cday.has-tasks { border-color: var(--border); }
        .cnum { font-size: 12px; font-weight: 500; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; border-radius: 50%; color: var(--text); }
        .cdots { display: flex; gap: 2px; flex-wrap: wrap; justify-content: center; max-width: 30px; }
        .cdot { width: 4px; height: 4px; border-radius: 50%; }
        .cal-detail { border: 0.5px solid var(--border); border-radius: var(--r); overflow: hidden; }
        .cdh { padding: 10px 14px; background: var(--bg2); border-bottom: 0.5px solid var(--border); display: flex; align-items: center; gap: 8px; }
        .cdh-date { font-size: 13px; font-weight: 500; flex: 1; }
        .cdh-add { font-size: 11px; padding: 3px 10px; border-radius: 20px; border: 0.5px solid var(--border2); background: none; color: var(--text2); transition: all .12s; }
        .cdh-add:hover { background: var(--bg3); }
        .cdempty { padding: 16px 14px; font-size: 12.5px; color: var(--text3); text-align: center; }
        .od-hero { border-radius: var(--r); padding: 16px; margin-bottom: 14px; background: var(--red-bg); border: 0.5px solid rgba(226, 75, 74, .18); display: flex; gap: 14px; align-items: center; }
        .od-num { font-size: 28px; font-weight: 700; color: var(--red-t); line-height: 1; }
        .od-sub { font-size: 11px; color: var(--red-t); opacity: .75; margin-top: 2px; }
        .od-oldest { text-align: right; margin-left: auto; }
        .od-oldest-n { font-size: 14px; font-weight: 600; color: var(--red-t); }
        .od-oldest-l { font-size: 10px; color: var(--red-t); opacity: .7; margin-bottom: 2px; }
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
        .stat-c { background: var(--bg2); border-radius: var(--r); padding: 12px 10px; text-align: center; }
        .stat-n { font-size: 20px; font-weight: 600; }
        .stat-l { font-size: 10px; color: var(--text3); margin-top: 2px; }
        .og { margin-bottom: 14px; }
        .og-hdr { display: flex; align-items: center; gap: 7px; margin-bottom: 7px; }
        .og-name { font-size: 12px; font-weight: 600; color: var(--text2); }
        .og-cnt { font-size: 10px; padding: 1px 7px; border-radius: 20px; background: var(--red-bg); color: var(--red-t); font-weight: 500; }
        .oc { border: 0.5px solid var(--border); border-radius: var(--r); margin-bottom: 6px; display: flex; overflow: hidden; transition: opacity .25s, transform .25s; }
        .oc-bar { width: 4px; flex-shrink: 0; background: var(--red); }
        .oc-body { flex: 1; display: flex; align-items: center; gap: 7px; padding: 8px 12px; flex-wrap: wrap; }
        .oc-name { font-size: 12.5px; color: var(--text); flex: 1; min-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .oc-days { font-size: 10px; color: var(--red-t); white-space: nowrap; }
        .rescue { font-size: 11px; padding: 3px 9px; border-radius: 20px; border: 0.5px solid var(--border2); background: none; color: var(--text2); white-space: nowrap; transition: all .15s; }
        .rescue:hover { background: var(--blue-bg); color: var(--blue-t); border-color: var(--blue); }
        .od-empty { text-align: center; padding: 36px 20px; }
        .od-empty-icon { font-size: 36px; margin-bottom: 10px; }
        .od-empty-t { font-size: 14px; font-weight: 500; color: var(--text2); margin-bottom: 4px; }
        .od-empty-s { font-size: 12px; color: var(--text3); }
        .ng { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 9px; }
        .nc { border: 0.5px solid var(--border); border-radius: var(--r); display: flex; overflow: hidden; cursor: pointer; transition: box-shadow .15s; position: relative; }
        .nc:hover { box-shadow: 0 2px 8px rgba(0, 0, 0, .07); }
        .nc-b { width: 3px; flex-shrink: 0; }
        .nc-i { flex: 1; padding: 11px 11px 11px 9px; min-width: 0; }
        .nc-time { font-size: 10px; color: var(--text3); margin-bottom: 4px; }
        .nc-txt { font-size: 12px; color: var(--text2); line-height: 1.5; margin-bottom: 7px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .nc-tag { font-size: 10px; padding: 1px 6px; background: var(--bg2); border-radius: 20px; color: var(--text3); display: inline-block; }
        .nc-del { position: absolute; top: 4px; right: 4px; background: rgba(0, 0, 0, 0.05); border: none; border-radius: 50%; width: 20px; height: 20px; font-size: 10px; display: flex; align-items: center; justify-content: center; color: var(--text3); opacity: 0; transition: opacity .15s; cursor: pointer; }
        .nc:hover .nc-del { opacity: 1; }
        .nc-del:hover { background: rgba(0, 0, 0, 0.1); color: var(--red); }
        .nc-new { display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 5px; color: var(--text3); font-size: 12px; min-height: 90px; border-style: dashed !important; }
        .nc-new:hover { background: var(--bg2); }
        .ach-banner { border-radius: var(--r); padding: 18px 16px; margin-bottom: 16px; background: linear-gradient(135deg, var(--gold-bg) 0%, var(--amber-bg) 100%); border: 0.5px solid rgba(199, 138, 28, .18); display: flex; align-items: center; gap: 14px; position: relative; overflow: hidden; }
        .ach-banner::after { content: ''; position: absolute; top: -20px; right: -20px; width: 80px; height: 80px; border-radius: 50%; background: rgba(199, 138, 28, .08); pointer-events: none; }
        .ach-banner-icon { font-size: 40px; flex-shrink: 0; position: relative; z-index: 1; animation: achPulse 2.5s ease-in-out infinite; }
        @keyframes achPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.12); } }
        .ach-banner-info { position: relative; z-index: 1; flex: 1; min-width: 0; }
        .ach-banner-num { font-size: 32px; font-weight: 700; color: var(--gold-t); line-height: 1; letter-spacing: -.02em; }
        .ach-banner-sub { font-size: 11px; color: var(--gold-t); opacity: .7; margin-top: 3px; }
        .ach-banner-right { text-align: right; position: relative; z-index: 1; flex-shrink: 0; }
        .ach-banner-pct { font-size: 26px; font-weight: 700; color: var(--gold-t); line-height: 1; }
        .ach-banner-pctl { font-size: 10px; color: var(--gold-t); opacity: .7; margin-top: 2px; }
        .ach-stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; margin-bottom: 16px; }
        .ach-stat-c { background: var(--bg2); border-radius: var(--r); padding: 13px 8px; text-align: center; transition: transform .15s, box-shadow .15s; }
        .ach-stat-c:hover { transform: translateY(-2px); box-shadow: 0 3px 10px rgba(0, 0, 0, .06); }
        .ach-stat-icon { font-size: 18px; margin-bottom: 4px; display: block; }
        .ach-stat-n { font-size: 18px; font-weight: 600; color: var(--text); line-height: 1.2; }
        .ach-stat-l { font-size: 9px; color: var(--text3); margin-top: 2px; letter-spacing: .03em; }
        .ach-section-title { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .07em; margin: 18px 0 10px; display: flex; align-items: center; gap: 6px; }
        .ach-section-title::after { content: ''; flex: 1; height: 0.5px; background: var(--border); margin-left: 4px; }
        .ach-badges-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
        .badge { border: 0.5px solid var(--border); border-radius: var(--r); padding: 14px 10px; text-align: center; cursor: default; transition: all .2s; position: relative; background: var(--bg); overflow: hidden; }
        .badge.earned { border-color: rgba(199, 138, 28, .35); background: linear-gradient(180deg, var(--gold-bg) 0%, var(--bg) 60%); box-shadow: 0 1px 4px rgba(199, 138, 28, .1); }
        .badge.earned:hover { box-shadow: 0 4px 14px rgba(199, 138, 28, .2); transform: translateY(-3px); }
        .badge.locked { opacity: .55; filter: grayscale(0.5); background: var(--bg2); }
        .badge.locked:hover { opacity: .7; filter: grayscale(0.3); }
        .badge-icon { font-size: 28px; display: block; margin-bottom: 6px; transition: transform .2s; }
        .badge.earned .badge-icon { animation: badgeGlow 3s ease-in-out infinite; }
        @keyframes badgeGlow { 0%, 100% { filter: drop-shadow(0 0 3px rgba(199, 138, 28, .3)); } 50% { filter: drop-shadow(0 0 8px rgba(199, 138, 28, .6)); } }
        .badge.locked .badge-icon { filter: grayscale(1); opacity: .5; }
        .badge-name { font-size: 11px; font-weight: 600; color: var(--text); margin-bottom: 3px; line-height: 1.3; }
        .badge-desc { font-size: 9px; color: var(--text3); line-height: 1.3; }
        .badge.earned .badge-name { color: var(--gold-t); }
        .badge-lock { position: absolute; top: 6px; right: 8px; font-size: 9px; opacity: .5; }
        .badge-del { position: absolute; top: 4px; right: 4px; background: rgba(0, 0, 0, 0.05); border: none; border-radius: 50%; width: 20px; height: 20px; font-size: 10px; display: flex; align-items: center; justify-content: center; color: var(--text3); opacity: 0; transition: opacity .15s; cursor: pointer; }
        .badge:hover .badge-del { opacity: 1; }
        .badge-del:hover { background: rgba(0, 0, 0, 0.1); color: var(--red); }
        .add-badge-btn { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 8px 12px; border: 1px dashed var(--border2); border-radius: var(--rsm); background: none; color: var(--text2); font-size: 12px; margin-top: 10px; width: 100%; transition: all .12s; }
        .add-badge-btn:hover { background: var(--bg2); border-color: var(--blue); color: var(--blue); }
        .ach-progress-section { margin-bottom: 16px; }
        .ach-proj-item { margin-bottom: 10px; }
        .ach-proj-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; font-size: 11px; color: var(--text2); }
        .ach-proj-name { font-weight: 500; }
        .ach-proj-pct { font-size: 10px; color: var(--text3); font-weight: 500; }
        .ach-prog-track { height: 6px; border-radius: 3px; background: var(--bg3); overflow: hidden; }
        .ach-prog-fill { height: 100%; border-radius: 3px; transition: width .6s ease; }
        .ach-prog-fill.green { background: var(--green); }
        .ach-prog-fill.amber { background: var(--amber); }
        .ach-prog-fill.blue { background: var(--blue); }
        .ach-prog-fill.purple { background: var(--purple); }
        .completed-list { margin-bottom: 14px; }
        .completed-item { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: var(--rsm); background: var(--bg2); margin-bottom: 4px; font-size: 12px; }
        .completed-item .tname { font-size: 12px; text-decoration: line-through; color: var(--text2); }
        .overdue-solved-tag { background: var(--blue-bg); color: var(--blue-t); font-size: 9px; padding: 2px 6px; border-radius: 20px; white-space: nowrap; }
        .task-time { font-size: 9px; color: var(--text3); white-space: nowrap; margin-left: 4px; }
        .fab-wrap { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; align-items: flex-end; gap: 8px; z-index: 100; }
        .fab-menu { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; opacity: 0; pointer-events: none; transform: translateY(8px); transition: all .18s; }
        .fab-menu.open { opacity: 1; pointer-events: auto; transform: translateY(0); }
        .fab-row { display: flex; align-items: center; gap: 8px; }
        .fab-lbl { font-size: 12px; color: var(--text); background: var(--bg); border: 0.5px solid var(--border); padding: 4px 11px; border-radius: var(--rsm); box-shadow: 0 2px 8px rgba(0, 0, 0, .08); white-space: nowrap; }
        .fab-ic { width: 32px; height: 32px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; font-size: 14px; color: #fff; flex-shrink: 0; }
        .fab-main { width: 40px; height: 40px; border-radius: 50%; background: var(--text); border: none; display: flex; align-items: center; justify-content: center; color: var(--bg); font-size: 22px; transition: transform .2s, box-shadow .2s; box-shadow: 0 3px 10px rgba(0, 0, 0, .18); }
        .fab-main.open { transform: rotate(45deg); }
        .fab-main:hover { box-shadow: 0 4px 14px rgba(0, 0, 0, .22); }
        .spop { position: fixed; background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--r); box-shadow: 0 4px 16px rgba(0, 0, 0, .12); z-index: 200; min-width: 128px; overflow: hidden; display: none; }
        .spop.show { display: block; }
        .spop-it { padding: 8px 13px; font-size: 12.5px; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: background .1s; }

                return (d.getMonth() + 1) + '/' + d.getDate() + ' ' + d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
            }
            function urgClass(u) { return u === 'high' ? 'high' : u === 'mid' ? 'mid' : 'low'; }
            function urgLabel(u) { return u === 'high' ? '紧急' : u === 'mid' ? '中' : '低'; }
            function ck(y, m, d) { return y + '-' + (m + 1) + '-' + d; }
            function isOverdue(task) {
                if (!task.deadline) return false;
                if (task.done) return false;
                return new Date(task.deadline + 'T00:00:00') < today;
            }
            function getOverdueDays(task) {
                if (!task.deadline) return 0;
                const dl = new Date(task.deadline + 'T00:00:00');
                return Math.floor((today - dl) / (1000 * 60 * 60 * 24));
            }

            function renderCal() {
                document.getElementById('cal-m').textContent = cY + '年 ' + MONTHS[cM];
                const g = document.getElementById('cal-grid');
                g.innerHTML = '';
                DOW.forEach(d => { const e = document.createElement('div'); e.className = 'cdow'; e.textContent = d; g.appendChild(e); });
                const first = new Date(cY, cM, 1).getDay();
                const days = new Date(cY, cM + 1, 0).getDate();
                const prevD = new Date(cY, cM, 0).getDate();
                const pm = cM === 0 ? 11 : cM - 1, py = cM === 0 ? cY - 1 : cY;
                const nm = cM === 11 ? 0 : cM + 1, ny = cM === 11 ? cY + 1 : cY;
                function mkDay(num, mo, yr, other) {
                    const el = document.createElement('div');
                    el.className = 'cday' + (other ? ' other' : '');
                    const key = ck(yr, mo, num);
                    const isT = yr === today.getFullYear() && mo === today.getMonth() && num === today.getDate();
                    if (isT) el.classList.add('today');
                    const tasks = db.calTasks[key] || [];
                    if (tasks.length) el.classList.add('has-tasks');
                    const ne = document.createElement('div'); ne.className = 'cnum'; ne.textContent = num; el.appendChild(ne);
                    if (tasks.length) {
                        const dd = document.createElement('div'); dd.className = 'cdots';
                        const uc = { 'high': 'var(--red)', 'mid': 'var(--amber)', 'low': 'var(--green)' };
                        tasks.slice(0, 4).forEach(t => { const d = document.createElement('div'); d.className = 'cdot'; d.style.background = uc[t.urgency] || 'var(--gray)'; dd.appendChild(d); });
                        el.appendChild(dd);
                    }
                    el.dataset.calKey = key; el.dataset.calNum = num; el.dataset.calMo = mo; el.dataset.calYr = yr;
                    return el;
                }
                for (let i = first - 1; i >= 0; i--) g.appendChild(mkDay(prevD - i, pm, py, true));
                for (let d = 1; d <= days; d++) g.appendChild(mkDay(d, cM, cY, false));
                const rem = (7 - (first + days) % 7) % 7;
                for (let n = 1; n <= rem; n++) g.appendChild(mkDay(n, nm, ny, true));
            }

                if (!confirm(`确定删除项目“${proj.name}”吗？关联任务将变为独立任务。`)) return;

            function checkAchievements() {
                const doneTasks = db.tasks.filter(t => t.done);
                const allAchievements = [...db.achievements, ...db.customAchievements];
                allAchievements.forEach(a => {
                    if (a.unlocked) return;
                    let shouldUnlock = false;
                    if (a.condition === 'finish1' && doneTasks.length >= 1) shouldUnlock = true;
                    if (a.condition === 'finish10' && doneTasks.length >= 10) shouldUnlock = true;
                    if (a.condition === 'finish50' && doneTasks.length >= 50) shouldUnlock = true;
                    if (a.condition === 'high5' && doneTasks.filter(t => t.urgency === 'high').length >= 5) shouldUnlock = true;
                    if (a.condition === 'read3' && doneTasks.filter(t => getProjectName(t.projectId) === '阅读计划').length >= 3) shouldUnlock = true;
                    if (a.condition === 'projDone') {
                        if (db.projects.filter(p => { const pt = db.tasks.filter(t => t.projectId === p.id); return pt.length > 0 && pt.every(t => t.done); }).length >= 1) shouldUnlock = true;
                    }
                    if (a.condition === 'rustHalf' && doneTasks.filter(t => getProjectName(t.projectId) === '学习 Rust').length >= 3) shouldUnlock = true;
                    if (a.condition === 'fit3' && doneTasks.filter(t => getProjectName(t.projectId) === '健身记录').length >= 3) shouldUnlock = true;
                    if (a.condition === 'overdueFix' && db.completedOverdueTasks.length >= 3) shouldUnlock = true;
                    if (shouldUnlock) {
                        a.unlocked = true;
                        showAchievement(a);
                    }
                });
                saveDB();
            }

            function handleOverdueTask(taskId) {
                const t = db.tasks.find(x => x.id === taskId);
                if (!t) return;
                t.done = true;
                t.completedAt = new Date().toISOString();
                db.completedOverdueTasks.push({ name: t.name, urgency: t.urgency, projectId: t.projectId, projectName: getProjectName(t.projectId), solvedAt: new Date().toISOString() });
                toast('逾期任务已处理');
                checkAchievements();
                saveDB();
                refreshAll();
            }

            function deleteNote(noteId) {
                if (!confirm('确定删除这条笔记吗？')) return;
                db.notes = db.notes.filter(n => n.id !== noteId);
                saveDB();
                refreshAll();
            }

            function deleteAchievement(achId) {
                if (!confirm('确定删除这个勋章吗？')) return;
                db.achievements = db.achievements.filter(a => a.id !== achId);
                db.customAchievements = db.customAchievements.filter(a => a.id !== achId);
                saveDB();
                refreshAll();
            }

            function toggleCalTaskDone(key, idx) {
                const tasks = db.calTasks[key];
                if (!tasks || !tasks[idx]) return;
                tasks[idx].done = !tasks[idx].done;
                saveDB();
                selDay(document.querySelector('.cday.selected'), parseInt(document.querySelector('.cday.selected').dataset.calNum), parseInt(document.querySelector('.cday.selected').dataset.calMo), parseInt(document.querySelector('.cday.selected').dataset.calYr), key);
                renderCal();
            }

            function deleteCalTask(key, idx) {
                if (!confirm('删除这个日历任务吗？')) return;
                const tasks = db.calTasks[key];
                if (!tasks || !tasks[idx]) return;
                tasks.splice(idx, 1);
                if (tasks.length === 0) delete db.calTasks[key];
                saveDB();
                const selEl = document.querySelector('.cday.selected');
                if (selEl) {
                    const num = parseInt(selEl.dataset.calNum), mo = parseInt(selEl.dataset.calMo), yr = parseInt(selEl.dataset.calYr);
                    selDay(selEl, num, mo, yr, key);
                } else {
                    document.getElementById('cdh-body').innerHTML = '<div class="cdempty">暂无安排</div>';
                }
                renderCal();
            }

            // ==================== EVENT DELEGATION ====================
            document.addEventListener('click', function(e) {
                const target = e.target;

                // 任务编辑
                const editBtn = target.closest('.task-edit-btn');
                if (editBtn) {
                    e.stopPropagation();
                    const taskId = editBtn.dataset.editTaskId;
                    if (taskId) { editTask(taskId); }
                    return;
                }
                // 任务删除
                const delBtn = target.closest('.task-del-btn');
                if (delBtn) {
                    e.stopPropagation();
                    const taskId = delBtn.dataset.deleteTaskId;
                    if (taskId) { deleteTask(taskId); }
                    return;
                }
                // 项目编辑
                const projEditBtn = target.closest('.proj-edit-btn');
                if (projEditBtn) {
                    e.stopPropagation();
                    const projId = projEditBtn.dataset.editProjId;
                    if (projId) { editProject(projId); }
                    return;
                }
                // 项目删除
                const projDelBtn = target.closest('.proj-del-btn');
                if (projDelBtn) {
                    e.stopPropagation();
                    const projId = projDelBtn.dataset.deleteProjId;
                    if (projId) { deleteProject(projId); }
                    return;
                }

                const taskRow = target.closest('[data-task-id]');
                if (taskRow && !target.closest('.phdr') && !target.closest('.spill')) {
                    const taskId = taskRow.dataset.taskId;
                    if (taskId) {
                        e.stopPropagation();
                        toggleTask(taskId);
                        return;
                    }
                }
                const phdr = target.closest('.phdr');
                if (phdr && !target.closest('.spill') && !target.closest('.proj-edit-btn') && !target.closest('.proj-del-btn')) {
                    const projId = phdr.dataset.projId;
                    if (projId) {
                        if (expandedProjects.has(projId)) expandedProjects.delete(projId);
                        else expandedProjects.add(projId);
                        const chev = phdr.querySelector('.chev');
                        const ptasks = phdr.nextElementSibling;
                        if (chev) chev.classList.toggle('open');
                        if (ptasks && ptasks.classList.contains('ptasks')) ptasks.classList.toggle('open');
                        return;
                    }
                }
                if (target.classList.contains('spill')) {
                    const projId = target.dataset.projId;
                    if (projId) {
                        e.stopPropagation();
                        activePillBtn = target;
                        activePillProjId = projId;
                        const pop = document.getElementById('spop');
                        const r = target.getBoundingClientRect();
                        let top = r.bottom + window.scrollY + 4;
                        let left = r.left;
                        if (left + 134 > window.innerWidth) left = window.innerWidth - 138;
                        pop.style.top = top + 'px';
                        pop.style.left = left + 'px';
                        pop.classList.add('show');
                        return;
                    }
                }
                const cday = target.closest('.cday');
                if (cday && cday.dataset.calKey) {
                    const num = parseInt(cday.dataset.calNum), mo = parseInt(cday.dataset.calMo), yr = parseInt(cday.dataset.calYr), key = cday.dataset.calKey;
                    selDay(cday, num, mo, yr, key);
                    return;
                }
                if (target.classList.contains('rescue')) {
                    const taskId = target.dataset.overdueTaskId;
                    if (taskId) { handleOverdueTask(taskId); return; }
                }
                if (target.classList.contains('nc-del')) {
                    const noteId = target.dataset.noteId;
                    if (noteId) { deleteNote(noteId); return; }
                }
                if (target.classList.contains('badge-del')) {
                    const achId = target.dataset.achId;
                    if (achId) { deleteAchievement(achId); return; }
                }
                if (!target.closest('#spop') && !target.closest('.spill')) {
                    document.getElementById('spop').classList.remove('show');
                }
            });

            document.getElementById('spop').addEventListener('click', function(e) {
                const item = e.target.closest('.spop-it');
                if (!item) return;
                const status = item.dataset.status;
                if (!status || !activePillProjId) return;
                const proj = db.projects.find(p => p.id === activePillProjId);
                if (!proj) return;
                proj.status = status;
                const scMap = {
                    '未开始': { cl: 'var(--gray)', bg: 'var(--gray-bg)', tc: 'var(--gray-t)' },
                    '进行中': { cl: 'var(--green)', bg: 'var(--green-bg)', tc: 'var(--green-t)' },
                    '暂存': { cl: 'var(--amber)', bg: 'var(--amber-bg)', tc: 'var(--amber-t)' },
                    '已完成': { cl: 'var(--blue)', bg: 'var(--blue-bg)', tc: 'var(--blue-t)' },
                    '已归档': { cl: 'var(--gray)', bg: 'var(--gray-bg)', tc: 'var(--gray-t)' }
                };
                const sc = scMap[status];
                if (activePillBtn) {
                    activePillBtn.textContent = status;
                    activePillBtn.style.background = sc.bg;
                    activePillBtn.style.color = sc.tc;
                    const pc = activePillBtn.closest('.pc');
                    if (pc) pc.querySelector('.stbar').style.background = sc.cl;
                }
                document.getElementById('spop').classList.remove('show');
                saveDB();
                refreshAll();
            });

            function selDay(el, num, mo, yr, key) {
                document.querySelectorAll('.cday').forEach(c => c.classList.remove('selected'));
                el.classList.add('selected');
                selectedCalKey = key;
                const det = document.getElementById('cal-det');
                det.style.display = 'block';
                document.getElementById('cdh-date').textContent = yr + '年' + (mo + 1) + '月' + num + '日';
                const body = document.getElementById('cdh-body');
                const tasks = db.calTasks[key] || [];
                if (!tasks.length) { body.innerHTML = '<div class="cdempty">暂无安排，点击右侧按钮添加任务</div>'; return; }
                body.innerHTML = '';
                tasks.forEach((t, idx) => {
                    const row = document.createElement('div');
                    row.className = 'tr' + (t.done ? ' done-row' : '');
                    row.innerHTML = `
                        <div class="chk${t.done ? ' done' : ''}"></div>
                        <span class="tname${t.done ? ' done' : ''}">${t.name}</span>
                        <span class="urg u-${urgClass(t.urgency)}">${urgLabel(t.urgency)}</span>
                        <div class="task-actions">
                            <button class="task-del-btn" data-cal-del-key="${key}" data-cal-del-idx="${idx}">✕</button>
                        </div>
                    `;
                    row.addEventListener('click', function(e) {
                        if (e.target.closest('.task-del-btn')) return;
                        toggleCalTaskDone(key, idx);
                    });
                    body.appendChild(row);
                });
            }

            document.addEventListener('click', function(e) {
                const delCal = e.target.closest('.task-del-btn[data-cal-del-key]');
                if (delCal) {
                    e.stopPropagation();
                    const key = delCal.dataset.calDelKey;
                    const idx = parseInt(delCal.dataset.calDelIdx);
                    if (key && !isNaN(idx)) deleteCalTask(key, idx);
                }
            });

            document.getElementById('tab-strip').addEventListener('click', function(e) {
                const btn = e.target.closest('.tbtn');
                if (!btn) return;
                const viewName = btn.dataset.view;
                if (!viewName) return;
                document.querySelectorAll('.tbtn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
                const ve = document.getElementById('view-' + viewName);
                if (ve) ve.classList.add('active');
                if (viewName === 'calendar') renderCal();
                refreshAll();
                if (fabOpen) { fabOpen = false; document.getElementById('fm').classList.remove('open'); document.getElementById('fab').classList.remove('open'); }
            });

            window.toggleFab = function() { fabOpen = !fabOpen; document.getElementById('fm').classList.toggle('open', fabOpen); document.getElementById('fab').classList.toggle('open', fabOpen); };
            window.closeFab = function() { fabOpen = false; document.getElementById('fm').classList.remove('open'); document.getElementById('fab').classList.remove('open'); };
            document.addEventListener('click', function(e) { if (fabOpen && !e.target.closest('#fw')) { fabOpen = false; document.getElementById('fm').classList.remove('open'); document.getElementById('fab').classList.remove('open'); } });

            window.calNav = function(dir) { cM += dir; if (cM > 11) { cM = 0; cY++; } else if (cM < 0) { cM = 11; cY--; } renderCal(); document.getElementById('cal-det').style.display = 'none'; selectedCalKey = null; };

            const modalTemplates = {
                task: '<div class="mf"><label>任务名称</label><input type="text" id="mf-task-name" placeholder="输入任务名称..."></div><div class="mf"><label>紧急程度</label><div class="urg-sel"><button class="uo" onclick="selectUrgency(this,\'high\')">🔴 紧急</button><button class="uo sm" onclick="selectUrgency(this,\'mid\')">🟡 中</button><button class="uo" onclick="selectUrgency(this,\'low\')">🟢 低</button></div></div><div class="mf"><label>所属项目</label><select id="mf-task-proj"><option value="">（无项目）</option>' + db.projects.map(p => '<option value="' + p.id + '">' + p.name + '</option>').join('') + '</select></div><div class="mf"><label>截止日期</label><input type="date" id="mf-task-date"></div>',
                note: '<div class="mf"><label>内容</label><textarea id="mf-note-content" placeholder="记录你的思路..."></textarea></div><div class="mf"><label>关联项目</label><select id="mf-note-proj"><option value="">（无）</option>' + db.projects.map(p => '<option value="' + p.id + '">' + p.name + '</option>').join('') + '</select></div>',
                project: '<div class="mf"><label>项目名称</label><input type="text" id="mf-proj-name" placeholder="输入项目名称..."></div><div class="mf"><label>状态</label><select id="mf-proj-status"><option>未开始</option><option>进行中</option><option>暂存</option><option>已完成</option></select></div><div class="mf"><label>备注</label><textarea id="mf-proj-desc" placeholder="项目说明..."></textarea></div>',
                badge: '<div class="mf"><label>勋章图标 (emoji)</label><input type="text" id="mf-badge-icon" placeholder="例如 🏆" maxlength="4"></div><div class="mf"><label>勋章名称</label><input type="text" id="mf-badge-name" placeholder="输入勋章名称..."></div><div class="mf"><label>描述</label><input type="text" id="mf-badge-desc" placeholder="解锁条件或描述..."></div>'
            };
            const modalTitles = { 'task': '添加任务', 'note': '添加笔记', 'project': '新建项目', 'badge': '自定义勋章', 'edit-task': '编辑任务', 'edit-project': '编辑项目' };

            window.openModal = function(type, id) {
                currentModalType = type;
                editingTaskId = (type === 'edit-task') ? id : null;
                editingProjectId = (type === 'edit-project') ? id : null;
                document.getElementById('mt').textContent = modalTitles[type] || '添加';
                const template = (type === 'edit-task') ? modalTemplates['task'] : (type === 'edit-project' ? modalTemplates['project'] : modalTemplates[type]);
                document.getElementById('mb').innerHTML = template || '';
                document.getElementById('mo').classList.add('show');

                if ((type === 'task' || type === 'edit-task') && template) {
                    const btns = document.querySelectorAll('#mb .uo');
                    if (btns.length >= 2) btns[1].classList.add('sm');
                    if (type === 'edit-task' && id) {
                        const task = db.tasks.find(t => t.id === id);
                        if (task) {
                            const nameEl = document.getElementById('mf-task-name');
                            const projEl = document.getElementById('mf-task-proj');
                            const dateEl = document.getElementById('mf-task-date');
                            if (nameEl) nameEl.value = task.name;
                            if (projEl) projEl.value = task.projectId || '';
                            if (dateEl && task.deadline) dateEl.value = task.deadline;
                            const urgBtns = document.querySelectorAll('#mb .uo');
                            urgBtns.forEach(b => {
                                b.classList.remove('sh', 'sm', 'sl2');
                                if (b.textContent.includes('紧急') && task.urgency === 'high') b.classList.add('sh');
                                if (b.textContent.includes('中') && task.urgency === 'mid') b.classList.add('sm');
                                if (b.textContent.includes('低') && task.urgency === 'low') b.classList.add('sl2');
                            });
                        }
                    }
                    const nameInput = document.getElementById('mf-task-name');
                    if (nameInput) { nameInput.focus(); nameInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') { e.preventDefault(); saveModal(); } }); }
                }
                if (type === 'edit-project' && template && id) {
                    const proj = getProject(id);
                    if (proj) {
                        const nameEl = document.getElementById('mf-proj-name');
                        const statusEl = document.getElementById('mf-proj-status');
                        const descEl = document.getElementById('mf-proj-desc');
                        if (nameEl) nameEl.value = proj.name;
                        if (statusEl) statusEl.value = proj.status;
                        if (descEl) descEl.value = '';
                    }
                }
                if (type === 'note') {
                    const textarea = document.getElementById('mf-note-content');
                    if (textarea) { textarea.focus(); textarea.addEventListener('keydown', function(e) { if (e.key === 'Enter' && e.ctrlKey) { e.preventDefault(); saveModal(); } }); }
                }
            };

            window.closeModal = function() { 
                document.getElementById('mo').classList.remove('show'); 
                currentModalType = null; 
                editingTaskId = null;
                editingProjectId = null;
            };
            window.closeModalOverlay = function(e) { 
                if (e.target === document.getElementById('mo')) { 
                    document.getElementById('mo').classList.remove('show'); 
                    currentModalType = null;
                    editingTaskId = null;
                    editingProjectId = null;
                } 
            };
            window.selectUrgency = function(btn, u) { 
                btn.closest('.urg-sel').querySelectorAll('.uo').forEach(b => { b.className = 'uo'; }); 
                btn.classList.add('s' + u[0]); 
            };

            window.saveModal = function() {
                if (currentModalType === 'task' || currentModalType === 'edit-task') {
                    const nameEl = document.getElementById('mf-task-name');
                    const projEl = document.getElementById('mf-task-proj');
                    const dateEl = document.getElementById('mf-task-date');
                    const urgBtn = document.querySelector('#mb .uo.sh, #mb .uo.sm, #mb .uo.sl2');
                    const name = nameEl ? nameEl.value.trim() : '';
                    if (!name) { toast('请输入任务名称'); return; }
                    const urgency = urgBtn ? (urgBtn.classList.contains('sh') ? 'high' : urgBtn.classList.contains('sm') ? 'mid' : 'low') : 'mid';
                    const projectId = projEl ? projEl.value || null : null;
                    const deadline = dateEl && dateEl.value ? dateEl.value : null;

                    if (currentModalType === 'edit-task' && editingTaskId) {
                        const task = db.tasks.find(t => t.id === editingTaskId);
                        if (task) {
                            task.name = name;
                            task.urgency = urgency;
                            task.projectId = projectId;
                            task.deadline = deadline;
                            toast('任务已更新');
                        }
                    } else {
                        const newTask = { id: genId(), name, urgency, projectId, done: false, daily: false, streak: '', createdAt: new Date().toISOString(), completedAt: null, deadline };
                        db.tasks.push(newTask);
                        if (deadline) {
                            const d = new Date(deadline + 'T00:00:00');
                            const key = ck(d.getFullYear(), d.getMonth(), d.getDate());
                            if (!db.calTasks[key]) db.calTasks[key] = [];
                            db.calTasks[key].push({ name, urgency, done: false });
                        } else if (selectedCalKey) {
                            if (!db.calTasks[selectedCalKey]) db.calTasks[selectedCalKey] = [];
                            db.calTasks[selectedCalKey].push({ name, urgency, done: false });
                        }
                        toast('任务已添加');
                    }
                    selectedCalKey = null;
                    editingTaskId = null;
                    saveDB();
                    refreshAll();
                    closeModal();
                } else if (currentModalType === 'edit-project' && editingProjectId) {
                    const nameEl = document.getElementById('mf-proj-name');
                    const statusEl = document.getElementById('mf-proj-status');
                    const name = nameEl ? nameEl.value.trim() : '';
                    if (!name) { toast('请输入项目名称'); return; }
                    const proj = getProject(editingProjectId);
                    if (proj) {
                        proj.name = name;
                        proj.status = statusEl ? statusEl.value : proj.status;
                        toast('项目已更新');
                        saveDB();
                        refreshAll();
                    }
                    editingProjectId = null;
                    closeModal();
                } else if (currentModalType === 'project') {
                    const nameEl = document.getElementById('mf-proj-name');
                    const statusEl = document.getElementById('mf-proj-status');
                    const name = nameEl ? nameEl.value.trim() : '';
                    if (!name) { toast('请输入项目名称'); return; }
                    const status = statusEl ? statusEl.value : '未开始';
                    const colors = ['var(--green)', 'var(--amber)', 'var(--blue)', 'var(--purple)', 'var(--pink)', 'var(--red)'];
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    db.projects.push({ id: genId(), name, color, status });
                    saveDB();
                    refreshAll();
                    toast('项目已创建');
                    closeModal();
                } else if (currentModalType === 'note') {
                    const contentEl = document.getElementById('mf-note-content');
                    const projEl = document.getElementById('mf-note-proj');
                    const content = contentEl ? contentEl.value.trim() : '';
                    if (!content) { toast('请输入笔记内容'); return; }
                    const projectId = projEl ? projEl.value || null : null;
                    const proj = projectId ? getProject(projectId) : null;
                    const tag = proj ? '# ' + proj.name : '# 笔记';
                    const color = proj ? proj.color : 'var(--blue)';
                    db.notes.unshift({ id: genId(), content, tag, color, createdAt: new Date().toISOString(), projectId });
                    saveDB();
                    refreshAll();
                    toast('笔记已保存');
                    closeModal();
                } else if (currentModalType === 'badge') {
                    const iconEl = document.getElementById('mf-badge-icon');
                    const nameEl = document.getElementById('mf-badge-name');
                    const descEl = document.getElementById('mf-badge-desc');
                    const name = nameEl ? nameEl.value.trim() : '';
                    if (!name) { toast('请输入勋章名称'); return; }
                    const icon = iconEl ? (iconEl.value.trim() || '🏅') : '🏅';
                    const desc = descEl ? (descEl.value.trim() || '') : '';
                    db.customAchievements.push({ id: 'custom_' + genId(), icon, name, desc, condition: 'custom', unlocked: true });
                    saveDB();
                    refreshAll();
                    toast('勋章已添加');
                    closeModal();
                }
                if (currentModalType === 'task' || currentModalType === 'edit-task') selectedCalKey = null;
            };

            function init() { checkAchievements(); refreshAll(); renderCal(); document.getElementById('cal-det').style.display = 'none'; }
            init();
        })();
    </script>
</body>
</html>
